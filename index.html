<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Condition Runner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e9e8e4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      max-width: 420px;
      background: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 0 1px rgba(0,0,0,.06);
    }

  /* Condition bar */
    #rule-bar {
      height: 52px;
      padding: 0 10px 0 12px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
      background: #16213e;
      transition: background .35s ease;
    }
  /* Tint classes applied per condition type */
    #rule-bar.tint-free       { background: #1e1e24; }
    #rule-bar.tint-sequence   { background: #1a1030; }
    #rule-bar.tint-streak     { background: #0d1f35; }
    #rule-bar.tint-time       { background: #2a0e0e; }

    #cond-bar-inner {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      padding-right: 30px;
    }
    #cond-center {
      flex: 1;
      min-width: 0;
    }
    #cond-progress {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    #cond-combo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-left: 8px;
      flex-shrink: 0;
    }
  /* Sequence / streak dots */
    .cond-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .cond-dot.active { transform: scale(1.3); }
  /* Count-limit chips */
    .cond-count-chip {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: rgba(255,255,255,.8);
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      padding: 1px 6px;
    }
    .cond-count-chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .cond-color-badge {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  /* Time-window clock label */
    .cond-clock-label {
      font-size: 11px;
      color: rgba(255,255,255,.75);
    }
    #rule-flash {
      position: absolute;
      inset: 0;
      background: #0F6E56;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
    }

  /* Mission pill */
    #mission-pill {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(10,10,20,.82);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 10px;
      padding: 5px 9px 5px 8px;
      min-width: 120px;
      max-width: 190px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      z-index: 10;
      transition: opacity .2s;
    }
    #mission-pill.hidden { opacity: 0; }
    #mission-pill.flash  { animation: mission-flash .4s ease; }
    @keyframes mission-flash {
      0%   { background: rgba(29,158,117,.9); border-color: rgba(29,158,117,.8); }
      60%  { background: rgba(29,158,117,.9); border-color: rgba(29,158,117,.8); }
      100% { background: rgba(10,10,20,.82);  border-color: rgba(255,255,255,.13); }
    }
    #mission-desc {
      font-size: 10px;
      color: rgba(255,255,255,.75);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    #mission-bar-track {
      height: 2px;
      background: rgba(255,255,255,.12);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 3px;
    }
    #mission-bar-fill {
      height: 2px;
      width: 0%;
      background: #1D9E75;
      border-radius: 99px;
      transition: width .12s linear;
    }
    #mission-reward {
      font-size: 9px;
      color: rgba(255,255,255,.38);
      text-align: right;
    }

  /* Score row */
    #score-row {
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid #ededeb;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f5f4f1;
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 12px;
      color: #555;
    }
    .chip-val {
      font-weight: 700;
      color: #1a1a1a;
    }

  /* Combo progress bar */
    #combo-track {
      height: 3px;
      background: #ededeb;
      position: relative;
      overflow: hidden;
    }
    #combo-fill {
      height: 3px;
      width: 0%;
      background: #378ADD;
      transform-origin: left center;
    }

  /* Level progress bar (thin, above canvas) */
    #level-progress {
      height: 2px;
      background: transparent;
      position: relative;
      flex-shrink: 0;
    }
    #level-progress-fill {
      height: 2px;
      width: 0%;
      transition: width .18s linear;
      border-radius: 0 1px 1px 0;
    }

  /* Canvas area */
    #canvas-wrap {
      position: relative;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      flex-shrink: 0;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

  /* Canvas overlays (start / game-over / level-clear / level-intro) */
    .canvas-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(248,247,244,.93);
      gap: 10px;
      z-index: 10;
    }
    .canvas-overlay.hidden { display: none; }

  /* main game overlay kept as #overlay for backwards compat */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(248,247,244,.93);
      gap: 10px;
      z-index: 10;
    }
    #overlay.hidden { display: none; }
    #overlay-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }
    #overlay-sub {
      font-size: 13px;
      color: #666;
      text-align: center;
      padding: 0 24px;
      line-height: 1.5;
    }
    #overlay-scores {
      font-size: 13px;
      color: #444;
      text-align: center;
      line-height: 1.8;
    }
    .overlay-btn {
      margin-top: 6px;
      padding: 10px 32px;
      background: #0F6E56;
      color: #fff;
      border: none;
      border-radius: 99px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .overlay-btn:active { opacity: .75; }
  /* keep old id selector working */
    #overlay-btn { margin-top: 6px; padding: 10px 32px; background: #0F6E56; color: #fff;
      border: none; border-radius: 99px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .15s; }
    #overlay-btn:active { opacity: .75; }

  /* mechanic chips inside overlays */
    .mech-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 0 16px; }
    .mech-chip  { font-size: 11px; padding: 2px 9px; border-radius: 99px;
                  background: #f0efec; color: #555; border: 1px solid #e0dfdc; }

  /* progress bar (retry screen) */
    .prog-track { width: 200px; height: 6px; background: #e9e8e4; border-radius: 99px; overflow: hidden; }
    .prog-fill  { height: 6px; background: #0F6E56; border-radius: 99px; transition: width .3s; }

  /* star rating */
    .stars { font-size: 28px; letter-spacing: 4px; }

  /* secondary button (level-select from retry) */
    .overlay-btn-ghost {
      padding: 8px 24px;
      background: transparent;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 99px;
      font-size: 13px;
      cursor: pointer;
      transition: background .1s;
    }
    .overlay-btn-ghost:active { background: #f0efec; }

  /* Fever top border strip */
    #fever-bar {
      height: 3px;
      flex-shrink: 0;
      background: transparent;
      position: relative;
      overflow: hidden;
    }
    #fever-bar-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      background: #EF9F27;
      transform-origin: left center;
      transform: scaleX(0);
      transition: none;
    }
    #fever-bar.active #fever-bar-fill {
      animation: fever-bar-pulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes fever-bar-pulse {
      from { opacity: .7; }
      to   { opacity: 1; }
    }

  /* Fever combo-bar overlay */
    #fever-track {
      display: none;
      height: 3px;
      background: rgba(239,159,39,.2);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    #fever-track.active { display: block; }
    #fever-fill {
      height: 3px;
      width: 100%;
      background: #EF9F27;
      transform-origin: left center;
      transition: none;
    }
    #fever-label {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .12em;
      color: #EF9F27;
      pointer-events: none;
      z-index: 1;
    }
    #fever-label.active { display: flex; animation: fever-label-blink .5s ease infinite alternate; }
    @keyframes fever-label-blink {
      from { opacity: .7; }
      to   { opacity: 1; }
    }

  /* Slow skill row */
    #slow-row {
      height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      border-top: none;
      flex-shrink: 0;
      background: transparent;
      position: relative;
      overflow: visible;
      z-index: 3;
      pointer-events: none;
    }
    #slow-label {
      display: none;
    }
    #slow-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      width: 78px;
      height: 78px;
      padding: 0;
      background: rgba(255,255,255,.96);
      border: 1.5px solid rgba(15,110,86,.16);
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      transition: background .1s, border-color .1s, transform .08s, box-shadow .12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      pointer-events: auto;
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }
    #slow-count {
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
      color: #0F6E56;
      font-variant-numeric: tabular-nums;
    }
    #slow-caption {
      font-size: 10px;
      letter-spacing: .08em;
      color: #6f6f6b;
    }
    #slow-btn:active { transform: translateX(-50%) scale(.95); background: #e8e7e4; }
    #slow-btn.active {
      border-color: #378ADD;
      background: rgba(55,138,221,.08);
      animation: slow-btn-pulse .5s ease infinite alternate;
    }
    @keyframes slow-btn-pulse {
      from { box-shadow: 0 0 0 0 rgba(55,138,221,.3); }
      to   { box-shadow: 0 0 0 5px rgba(55,138,221,.0); }
    }
    #slow-btn.empty { opacity: .45; pointer-events: none; }

  /* Control buttons */
    #controls {
      height: 128px;
      display: flex;
      border-top: 1px solid #ededeb;
      flex-shrink: 0;
      background: linear-gradient(180deg, #fbfbfa 0%, #f1f0ed 100%);
    }
    .ctrl-btn {
      flex: 1;
      min-height: 128px;
      background: transparent;
      border: none;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .08s, transform .08s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      touch-action: none;
      color: #555;
      position: relative;
    }
    .ctrl-btn svg { width: 34px; height: 34px; pointer-events: none; opacity: .9; }
    .ctrl-btn.pressed {
      background: rgba(15,110,86,.08);
    }
    #ctrl-left { border-right: 1px solid rgba(0,0,0,.05); }
    #ctrl-left::after,
    #ctrl-right::after {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: .08em;
      color: #8a8a86;
      pointer-events: none;
    }
    #ctrl-left::after { content: 'LEFT'; }
    #ctrl-right::after { content: 'RIGHT'; }

  /* Level select screen */
    #level-select {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 24px;
    }
    #level-select.active { display: flex; }
    .level-select-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .level-select-header h2 { font-size: 18px; font-weight: 700; color: #1a1a1a; }
    .level-select-header button {
      font-size: 12px; padding: 5px 14px; border: 1px solid #ccc;
      border-radius: 99px; background: #fff; cursor: pointer; color: #555;
    }
    .phase-header {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: #aaa; margin: 14px 0 8px;
    }
    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .lv-card {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1.5px solid #e8e7e4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      transition: border-color .1s, background .1s;
      position: relative;
      background: #fff;
    }
    .lv-card.available:hover  { border-color: #0F6E56; background: #f0faf7; }
    .lv-card.locked           { background: #f7f6f3; cursor: default; }
    .lv-card.completed        { border-color: #0F6E56; background: #f0faf7; }
    .lv-card .lv-num          { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .lv-card.locked .lv-num   { color: #bbb; }
    .lv-card .lv-dot          { width: 7px; height: 7px; border-radius: 50%; }
    .lv-card .lv-star         { font-size: 11px; }
    .lv-card .lv-lock         { font-size: 14px; color: #ccc; }

  /* theme dot colors */
    .dot-space  { background: #6366f1; }
    .dot-neon   { background: #ec4899; }
    .dot-forest { background: #22c55e; }

  /* Settings gear button (inside rule-bar) */
    #settings-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: rgba(255,255,255,.45);
      transition: background .1s, color .1s;
      z-index: 2;
      padding: 0;
    }
    #settings-btn:active { background: rgba(255,255,255,.12); color: #fff; }
    #settings-btn svg { width: 18px; height: 18px; pointer-events: none; }
    #pause-btn {
      position: absolute;
      left: 50%;
      top: 96px;
      transform: none;
      width: 44px;
      height: 44px;
      border: none;
      background: rgba(255,255,255,.96);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #555;
      transition: background .1s, color .1s, transform .08s, box-shadow .12s;
      z-index: 2;
      padding: 0;
      box-shadow: 0 8px 20px rgba(0,0,0,.1);
      border: 1.5px solid rgba(15,110,86,.12);
      pointer-events: auto;
      margin-left: -22px;
    }
    #pause-btn:active { background: #e8e7e4; transform: scale(.95); }
    #pause-btn svg { width: 18px; height: 18px; pointer-events: none; }

  /* Settings bottom sheet */
    #settings-sheet {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
    }
    #settings-sheet.open { display: block; }
    #settings-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.4);
    }
    #settings-panel {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px 18px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      box-shadow: 0 -4px 32px rgba(0,0,0,.14);
    }
    #settings-sheet.open #settings-panel { transform: translateX(-50%) translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: #e0dfdb; margin: 12px auto 4px;
    }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px 12px;
      border-bottom: 1px solid #f0efec;
    }
    .sheet-header h3 { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .sheet-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: #f0efec; cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: #555;
      font-size: 16px;
    }
    .sheet-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #f7f6f3;
    }
    .sheet-row-label { font-size: 14px; color: #222; }
    .sheet-row-sub   { font-size: 11px; color: #aaa; margin-top: 2px; }
  /* Toggle switch */
    .toggle-wrap { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #d1d0cd; border-radius: 13px;
      cursor: pointer; transition: background .2s;
    }
    .toggle-wrap input:checked + .toggle-track { background: #0F6E56; }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: #fff; border-radius: 50%;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      pointer-events: none;
      transition: left .2s;
    }
    .toggle-wrap input:checked ~ .toggle-thumb { left: 21px; }
    .sheet-danger {
      margin: 12px 20px 20px; padding: 11px;
      border: 1px solid #fde8e4; border-radius: 10px;
      color: #D85A30; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; background: #fff9f8;
      transition: background .1s;
    }
    .sheet-danger:active { background: #fde8e4; }
    .sheet-version { font-size: 11px; color: #ccc; text-align: center; padding: 4px 0 16px; }

  /* Level select redesign: phase tabs + 5-column grid */
    #ls-total-stars {
      font-size: 13px; color: #888; font-weight: 500;
    }
    #phase-tabs {
      display: flex; gap: 4px; margin-bottom: 14px;
    }
    .phase-tab {
      flex: 1; padding: 7px 0; border: 1.5px solid #e8e7e4;
      border-radius: 8px; background: #fff; cursor: pointer;
      font-size: 12px; font-weight: 600; color: #888;
      transition: border-color .1s, color .1s, background .1s;
    }
    .phase-tab.active {
      border-color: #0F6E56; color: #0F6E56; background: #f0faf7;
    }
    .level-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }
    .lv-card .lv-stars-row {
      display: flex; gap: 1px; margin-top: 1px;
    }
    .lv-card .lv-stars-row span {
      font-size: 8px; line-height: 1;
    }

  /* Life icons (circle style) */
    .life-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #D85A30;
      flex-shrink: 0;
      transition: transform .2s, opacity .2s, background .2s;
    }
    .life-icon.lost {
      background: transparent;
      border: 1.5px solid rgba(216,90,48,.45);
      transform: scale(0.85);
      opacity: .6;
    }
    .life-icon.pop {
      animation: life-pop .3s ease;
    }
    @keyframes life-pop {
      0%   { transform: scale(1); }
      25%  { transform: scale(1.5); }
      60%  { transform: scale(0.7); }
      100% { transform: scale(0.85); }
    }
  </style>
</head>
<body>
<div id="app">

 <!-- LEVEL SELECT SCREEN (shown/hidden via JS) -->
  <div id="level-select">
    <div class="level-select-header">
      <h2>레벨 선택</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="ls-back-btn">뒤로</button>
      </div>
    </div>
    <div id="phase-tabs">
      <button class="phase-tab active" data-phase="0">입문</button>
      <button class="phase-tab" data-phase="1">적응</button>
      <button class="phase-tab" data-phase="2">심화</button>
      <button class="phase-tab" data-phase="3">마스터</button>
    </div>
    <div id="level-grid-container"><!-- JS renders cards here --></div>
  </div>

 <!-- GAME UI (hidden while level-select shown) -->
  <div id="game-ui" style="display:flex;flex-direction:column;flex:1;">

function pickPatternForLevel(lv) {
  let patterns = lv.patterns;
  let weights  = lv.patternWeights;
  if (lastSpawnPattern === 'cluster' && patterns.includes('cluster') && patterns.length > 1) {
    patterns = patterns.filter(p => p !== 'cluster');
    weights  = weights.filter((_, i) => lv.patterns[i] !== 'cluster');
  }
  const total    = weights.reduce((s, w) => s + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < patterns.length; i++) {
    r -= weights[i];
    if (r <= 0) return patterns[i];
  }
  return patterns[patterns.length - 1];
}

function defaultSave() {
  return {
    unlockedUpTo: 1,
    bestScores:   new Array(20).fill(0),
    totalScore:   0,
    settings: { sfxEnabled: true, vibrationEnabled: true },
  };
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const d = defaultSave();
      const s = JSON.parse(raw);
   // Merge to ensure all fields exist even on old saves
      return {
        unlockedUpTo: s.unlockedUpTo ?? d.unlockedUpTo,
        bestScores:   s.bestScores   ?? d.bestScores,
        totalScore:   s.totalScore   ?? d.totalScore,
        settings:     { ...d.settings, ...(s.settings || {}) },
      };
    }
  } catch (_) {}
  return defaultSave();
}

function writeSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (_) {}
}

// RESIZE CANVAS
function resizeCanvas() {
  const wrap = canvas.parentElement;
  const dpr  = window.devicePixelRatio || 1;
  const cssW = wrap.clientWidth;
  const cssH = Math.round(cssW * CANVAS_RATIO);
  canvas.width  = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

function cw() { return canvas.parentElement.clientWidth; }
function ch() { return canvas.parentElement.clientHeight; }

// UTILITY
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function toWholeScore(value) {
  return Number.isFinite(value) ? Math.max(0, Math.round(value)) : 0;
}

// LEVEL HELPERS - parameter accessors
function currentLevel() { return LEVELS[currentLevelIdx]; }

function feverScoreMultiplier() {
  if (!feverActive) return 1;
  return FEVER_SCORE_MUL;
}

// Speed: base + 0.3 per 60 score
function objFallSpeed() {
  const base = currentLevel().speedBase + Math.floor(score / 60) * OBJ_SPEED_STEP;
  if (slowActive) return base * SLOW_SPEED_MUL;
  if (slowFadeFrames > 0) {
  // ease-out: linearly interpolate from SLOW_SPEED_MUL back to 1.0
    const t = slowFadeFrames / SLOW_FADE_DURATION; // 1 ??0 as fade progresses
    const mul = SLOW_SPEED_MUL + (1 - SLOW_SPEED_MUL) * (1 - t);
    return base * mul;
  }
  if (feverActive) return base * 1.0; // fever doesn't change speed, only spawn rate
  return base;
}

// Spawn interval: base - 2 per 32 score, clamped to min
function objSpawnInterval() {
  const lv = currentLevel();
  const base = Math.max(OBJ_SPAWN_MIN, lv.spawnInterval - Math.floor(score / 32) * OBJ_SPAWN_STEP);
  if (slowActive) return Math.round(base / SLOW_SPEED_MUL); // slow = fewer spawns too
  if (slowFadeFrames > 0) {
  // ease-out: linearly interpolate from slow-interval back to normal
    const t = slowFadeFrames / SLOW_FADE_DURATION;
    const slowBase = Math.round(base / SLOW_SPEED_MUL);
    return Math.round(slowBase + (base - slowBase) * (1 - t));
  }
  if (feverActive) return Math.max(OBJ_SPAWN_MIN, Math.round(base * 0.8)); // 20% faster spawns in fever
  return base;
}

// PARTICLES
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      alpha: 1, color,
      r: 3 + Math.random() * 3,
    });
  }
}

// OBJECT FACTORY

// Build a single object dict (shared by spawnObject, spawnCluster, split children)
function makeObject(x, y, radius, pattern, sinOffset, splitCount, lv) {
  const w      = cw();
  const theme  = THEMES[lv.theme] || THEMES.space;
  const objDef = theme.objects[randInt(0, theme.objects.length - 1)];

  const ZIGZAG_VX = 2.1;
  const FAKE_VX   = 2.0;

 // 'moving' flag: true for patterns that drift horizontally (for motion-rule)
  const moving = ['wave', 'zigzag', 'chase', 'fake', 'cluster'].includes(pattern);

  return {
    x,
    y,
    r:          radius,
    color:      { name: objDef.name, fill: objDef.fill },
    shape:      objDef.shape,
    moving,
    pattern,
    baseX:      x,
    sinOffset,
    splitCount,
    speed:      null,        // set per-frame from objFallSpeed() for accelerate
    vx:         pattern === 'zigzag' ? (Math.random() < 0.5 ? ZIGZAG_VX : -ZIGZAG_VX)
              : pattern === 'fake'   ? (Math.random() < 0.5 ? FAKE_VX   : -FAKE_VX)
              : 0,
    zigzagTimer:   0,
    fakeDone:      false,
    fakeThreshold: 0,  // set after spawn once we know the canvas height
    fallMul:       1,
    noLifeLossOnMiss: false,
    spawnTime:     performance.now(),
  };
}

function pickSpawnX(lv, w, pattern, extraPad = 0) {
  const minX = 22 + OBJ_RADIUS + OBJ_EDGE_PADDING + extraPad;
  const maxX = w - 22 - OBJ_RADIUS - OBJ_EDGE_PADDING - extraPad;
  if (lastSpawnX !== null) {
    const maxGap =
      pattern === 'accelerate' && lastSpawnPattern === 'wave'
        ? WAVE_TO_ACCEL_MAX_SPAWN_GAP
        : (lv.patterns.includes('accelerate') ? ACCEL_LEVEL_MAX_SPAWN_GAP : (lv.lv >= 7 ? DEFAULT_MAX_SPAWN_GAP : null));
    const minGap =
      pattern === 'accelerate' && lastSpawnPattern === 'wave'
        ? WAVE_TO_ACCEL_MIN_SPAWN_GAP
        : (lv.patterns.includes('accelerate') ? ACCEL_LEVEL_MIN_SPAWN_GAP : (lv.lv >= 7 ? DEFAULT_MIN_SPAWN_GAP : null));
    if (maxGap !== null && minGap !== null) {
      const constrainedMin = Math.max(minX, lastSpawnX - maxGap);
      const constrainedMax = Math.min(maxX, lastSpawnX + maxGap);
      const leftMin  = constrainedMin;
      const leftMax  = Math.min(constrainedMax, lastSpawnX - minGap);
      const rightMin = Math.max(constrainedMin, lastSpawnX + minGap);
      const rightMax = constrainedMax;
      const leftLen  = Math.max(0, leftMax - leftMin + 1);
      const rightLen = Math.max(0, rightMax - rightMin + 1);
      const totalLen = leftLen + rightLen;

      if (totalLen > 0) {
        const pick = randInt(1, totalLen);
        if (pick <= leftLen) return randInt(leftMin, leftMax);
        return randInt(rightMin, rightMax);
      }

      if (constrainedMin <= constrainedMax) {
        return randInt(constrainedMin, constrainedMax);
      }
    }
  }
  return randInt(minX, maxX);
}

function spawnObject() {
  const lv = currentLevel();

  const w       = cw();
  const pattern = pickPatternForLevel(lv);

  if (pattern === 'cluster') {
    spawnCluster(lv);
    return pattern;
  }

  const x   = pickSpawnX(lv, w, pattern);
  const obj = makeObject(x, -OBJ_RADIUS - 10, OBJ_RADIUS, pattern,
                         Math.random() * Math.PI * 2, 0, lv);
  obj.fakeThreshold = ch() * 0.35;
  objects.push(obj);
  lastSpawnX = x;
  lastSpawnPattern = pattern;
  return pattern;
}

function spawnCluster(lv) {
  const w       = cw();
  const cx      = pickSpawnX(lv, w, 'cluster', 36);
  const offsets = [-36, 0, 36];
  offsets.forEach((dx, i) => {
    const x   = Math.max(OBJ_RADIUS + 4, Math.min(w - OBJ_RADIUS - 4, cx + dx));
    const obj = makeObject(x, -OBJ_RADIUS - 10 - (i * 26), OBJ_RADIUS, 'straight',
                           0, 0, lv);
    obj.fakeThreshold = ch() * 0.35;
    objects.push(obj);
  });
}

// Spawn the two split children when a 'split' object is collected
function spawnSplitChildren(parent, lv) {
  const childR = Math.round(parent.r * 0.7);
  const offsets = [-18, 18];
  offsets.forEach(dx => {
    const obj = makeObject(
      Math.max(childR + 4, Math.min(cw() - childR - 4, parent.x + dx)),
      parent.y,
      childR,
      'straight',
      0,
      1,   // splitCount = 1 prevents further splitting
      lv
    );
    obj.color = { ...parent.color };
    obj.shape = parent.shape;
    obj.fakeThreshold = ch() * 0.35;
    obj.fallMul = 0.72;
    obj.noLifeLossOnMiss = true;
    objects.push(obj);
  });
}

// OBJECT MOVEMENT - pattern dispatcher
function updateObject(obj, fallSpeed) {
  const w = cw();
  const effFallSpeed = fallSpeed * (obj.fallMul || 1);
  switch (obj.pattern) {

    case 'straight':
    default:
      obj.y += effFallSpeed;
      break;

    case 'wave':
      obj.sinOffset += 0.06;
      obj.x = obj.baseX + Math.sin(obj.sinOffset) * 30;
      obj.x = Math.max(obj.r + 2, Math.min(w - obj.r - 2, obj.x));
      obj.y += effFallSpeed;
      break;

    case 'accelerate': {
      const maxSpeed = effFallSpeed * 2.5;
      if (obj.speed === null) obj.speed = effFallSpeed;
      obj.speed = Math.min(obj.speed + 0.03, maxSpeed);
      obj.y += obj.speed;
      break;
    }

    case 'zigzag':
      obj.zigzagTimer++;
      if (obj.zigzagTimer >= 40) {
        obj.vx *= -1;
        obj.zigzagTimer = 0;
      }
      obj.x += obj.vx;
      if (obj.x - obj.r < 0)  { obj.x = obj.r;      obj.vx =  Math.abs(obj.vx); obj.zigzagTimer = 0; }
      if (obj.x + obj.r > w)  { obj.x = w - obj.r;  obj.vx = -Math.abs(obj.vx); obj.zigzagTimer = 0; }
      obj.y += effFallSpeed;
      break;

    case 'chase':
      obj.x += (player.x + PLAYER_W / 2 - obj.x) * (currentLevel().lv === 18 ? 0.0105 : 0.014);
      obj.y += effFallSpeed;
      break;

    case 'split':
   // Movement is straight; splitting happens in handleCollision
      obj.y += effFallSpeed;
      break;

    case 'fake':
      if (!obj.fakeDone && obj.y >= obj.fakeThreshold) {
        obj.vx *= -1;
        obj.fakeDone = true;
      }
      obj.x += obj.vx;
      if (obj.x - obj.r < 0)  { obj.x = obj.r;      obj.vx =  Math.abs(obj.vx); }
      if (obj.x + obj.r > w)  { obj.x = w - obj.r;  obj.vx = -Math.abs(obj.vx); }
      obj.y += effFallSpeed;
      break;

    case 'cluster':
   // cluster objects move as wave (assigned at spawn); same as wave
      obj.sinOffset += 0.06;
      obj.x = obj.baseX + Math.sin(obj.sinOffset) * 30;
      obj.x = Math.max(obj.r + 2, Math.min(w - obj.r - 2, obj.x));
      obj.y += effFallSpeed;
      break;
  }
}

// COLLECTION CONDITION ENGINE
// Returns { bonus: bool, penalise: bool, label: string }
function evaluateCondition(obj) {
  const c    = activeCond;
  const col  = obj.color.name;
  switch (c.type) {

    case 'free_collect':
      return { bonus: true, penalise: false, label: '+10' };

    case 'color_sequence': {
      const expected = c.sequence[seqIdx];
      if (col === expected) {
        seqIdx = (seqIdx + 1) % c.sequence.length;
        return { bonus: true, penalise: false, label: 'OK' };
      } else {
        seqIdx = 0;
        return { bonus: false, penalise: false, label: '+10' };
      }
    }

    default:
      return { bonus: true, penalise: false, label: '+10' };
  }
}

function handleCollision(obj) {
  spawnParticles(obj.x, obj.y, obj.color.fill, 8);

 // Split: spawn two smaller children before awarding score
  if (obj.pattern === 'split' && obj.splitCount === 0) {
    spawnSplitChildren(obj, currentLevel());
  }

  const px = player.x + PLAYER_W / 2;
  const py = player.y;

  const { bonus, penalise, label } = evaluateCondition(obj);
  const feverMul = feverScoreMultiplier();

  if (bonus) {
    combo++;
    const multiplier = feverMul * Math.max(1, Math.floor(combo / 3) + 1);
    const pts = Math.round(10 * multiplier);
    score += pts;
    if (score > best) best = score;
    player.eyeBlink = 200;
    vibrate(12);
    const text = `+${pts}`;
    feedbacks.push({ text, color: feverActive ? '#EF9F27' : '#1D9E75', alpha: 1, framesLeft: 22, ox: px, oy: py });
  // Trigger fever when combo hits threshold (only if not already in fever)
    if (!feverActive && combo >= FEVER_COMBO) activateFever();
  } else if (penalise) {
    const pts = Math.round(feverMul * 5);
    score += pts;
    if (score > best) best = score;
    feedbacks.push({ text: label, color: '#D85A30', alpha: 1, framesLeft: 22, ox: px, oy: py });
    vibrate([10, 5, 10]);
  } else {
    const pts = Math.round(feverMul * 10);
    score += pts;
    if (score > best) best = score;
    feedbacks.push({ text: `+${pts}`, color: '#EF9F27', alpha: 1, framesLeft: 22, ox: px, oy: py });
    vibrate(6);
  }

  score = toWholeScore(score);
  best  = toWholeScore(best);

 // Slow recharge: every SLOW_RECHARGE_EVERY collects = +1 charge
  totalCollects++;
  if (totalCollects % SLOW_RECHARGE_EVERY === 0) gainSlowCharge();

 // Advance active mission on every successful collect
  advanceMission(obj);

  renderConditionBar();
  renderMissionPill();
  updateUI();
}

// CONDITION BAR RENDERER
const COND_TINT = {
  free_collect: 'tint-free',
  color_sequence: 'tint-sequence',
};

const COLOR_KR = { red: '빨강', blue: '파랑', yellow: '노랑' };

// Mission pool
const MISSION_POOL = [
  { id:'survive_seconds',          type:'survive_seconds',          desc:'{n}초 동안 아무것도 놓치지 않기', reward:60  },
  { id:'combo_reach',              type:'combo_reach',              desc:'콤보 {n} 달성하기',             reward:40  },
  { id:'collect_after_rule_change',type:'collect_after_rule_change',desc:'조건 바뀐 뒤 {n}개 연속 수집',  reward:70  },
];

// Missions available by phase (0–3): harder missions unlock later
const MISSION_BY_PHASE = [
  ['survive_seconds'],
  ['survive_seconds','combo_reach'],
  ['survive_seconds','combo_reach'],
  ['combo_reach','collect_after_rule_change','survive_seconds'],
];

// Per-type target values scaled by phase
const MISSION_TARGETS = {
  collect_n_total:          [8, 12, 15, 20],
  collect_n_color:          [3,  4,  5,  6],
  survive_seconds:          [6,  8, 10, 12],
  combo_reach:              [4,  6,  8,  10],
  collect_after_rule_change:[2,  3,  3,  4],
};

function pickMissionForLevel(lvNum) {
  const phase   = Math.min(LEVELS[lvNum - 1].phase, 3);
  const pool    = MISSION_BY_PHASE[phase];
  const tmpl    = MISSION_POOL.find(m => m.id === pool[randInt(0, pool.length - 1)]);
  if (!tmpl) return null;
  const n       = MISSION_TARGETS[tmpl.type][phase];
  const tLimit  = tmpl.type === 'survive_seconds' ? n * 60 : null;
  const desc    = tmpl.desc.replace('{n}', n);
  return {
    id:       tmpl.id,
    type:     tmpl.type,
    desc,
    meta:     tmpl.meta || {},
    target:   n,
    progress: 0,
    reward:   tmpl.reward,
    timeLimit:tLimit,
    framesLeft: tLimit,
    startFrame: frameCount,
  };
}

function renderConditionBar() {
  const ruleBar = document.getElementById('rule-bar');
  const progress = document.getElementById('cond-progress');
  const labelEl  = document.getElementById('rule-desc');
  const comboEl  = document.getElementById('cond-combo-val');
  if (!ruleBar || !progress || !labelEl) return;

 // Update combo counter
  if (comboEl) comboEl.textContent = combo;

 // Swap tint class
  ruleBar.className = '';
  ruleBar.classList.add(COND_TINT[activeCond.type] || 'tint-free');

  const c = activeCond;

  switch (c.type) {

    case 'free_collect':
      labelEl.textContent = '자유 수집';
      progress.innerHTML = '<span style="font-size:11px;color:rgba(255,255,255,.5)">모든 오브젝트를 수집해 점수를 올리세요</span>';
      break;

    case 'color_sequence': {
      labelEl.textContent = '순서 수집';
      progress.innerHTML = c.sequence.map((col, i) => {
        const fill    = COLOR_FILLS[col] || '#888';
        const isCurr  = i === seqIdx;
        const isDone  = i < seqIdx;
        let dotStyle  = `width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;`;
        if (isDone)       dotStyle += `background:${fill};opacity:.5;`;
        else if (isCurr)  dotStyle += `background:${fill};box-shadow:0 0 0 2px rgba(255,255,255,.6);transform:scale(1.3);`;
        else              dotStyle += `background:transparent;border:2px solid ${fill};`;
        const arrow = i < c.sequence.length - 1 ? '<span style="color:rgba(255,255,255,.3);font-size:9px;margin:0 2px">→</span>' : '';
        return `<span style="${dotStyle}"></span>${arrow}`;
      }).join('');
      break;
    }

  }

 // Redraw condition icon
  drawConditionIcon(c);
}

function drawConditionIcon(c) {
  const ic = document.getElementById('rule-icon-canvas');
  if (!ic) return;
  const ctx2 = ic.getContext('2d');
  const sz = ic.width;
  ctx2.clearRect(0, 0, sz, sz);
  const cx = sz / 2, cy = sz / 2, r = 7;
  ctx2.fillStyle = 'rgba(255,255,255,.8)';
  ctx2.strokeStyle = 'rgba(255,255,255,.8)';
  ctx2.lineWidth = 1.5;

  switch (c.type) {
    case 'free_collect':
   // Star burst
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
        ctx2.beginPath();
        ctx2.moveTo(cx + Math.cos(a) * 3, cy + Math.sin(a) * 3);
        ctx2.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
        ctx2.stroke();
      }
      break;
    case 'color_sequence':
   // Three stacked dots
      [-5, 0, 5].forEach((dx, i) => {
        ctx2.globalAlpha = i === 0 ? 1 : 0.4 + i * 0.2;
        ctx2.beginPath();
        ctx2.arc(cx + dx * 0.7, cy, 2.5, 0, Math.PI * 2);
        ctx2.fill();
      });
      ctx2.globalAlpha = 1;
      break;
  }
}

// MISSION SYSTEM

function renderMissionPill() {
  const pill    = document.getElementById('mission-pill');
  const descEl  = document.getElementById('mission-desc');
  const fillEl  = document.getElementById('mission-bar-fill');
  const rwdEl   = document.getElementById('mission-reward');
  if (!pill) return;

  if (!activeMission || state !== 'play') {
    pill.classList.add('hidden');
    return;
  }

  pill.classList.remove('hidden');
  const m = activeMission;
  descEl.textContent = m.desc;
  rwdEl.textContent  = `+${m.reward}`;

 // progress bar: survive_seconds uses framesLeft ratio inverted
  let pct = 0;
  if (m.type === 'survive_seconds') {
    pct = m.framesLeft !== null
      ? Math.max(0, 1 - m.framesLeft / m.timeLimit)
      : 0;
  } else {
    pct = Math.min(1, m.progress / m.target);
  }
  fillEl.style.width = (pct * 100).toFixed(1) + '%';
}

function completeMission() {
  if (!activeMission) return;
  const m = activeMission;

  score += m.reward;
  score = toWholeScore(score);
  if (score > best) best = score;
  missionsThisLevel++;

 // Burst particles from pill position (top-right of canvas)
  const w = cw();
  const bx = w - 30, by = 18;
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 1.2 + Math.random() * 2.8;
    particles.push({
      x: bx, y: by,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      alpha: 1, color: '#1D9E75',
      r: 2 + Math.random() * 2,
    });
  }

 // Flash the pill green
  const pill = document.getElementById('mission-pill');
  if (pill) {
    pill.classList.remove('flash');
    void pill.offsetWidth; // reflow to restart animation
    pill.classList.add('flash');
  }

  feedbacks.push({
    text: `미션 완료 +${m.reward}`,
    color: '#1D9E75',
    alpha: 1,
    framesLeft: 40,
    ox: w / 2,
    oy: 40,
  });
  vibrate([10, 5, 30]);

 // Schedule next mission after 3s (180 frames) gap
  activeMission = null;
  missionSpawnFrame = frameCount + 180;
  updateUI();
}

function failMission() {
  activeMission = null;
 // Reassign immediately (next frame tick)
  missionSpawnFrame = frameCount + 1;
}

// Called on every successful collect - advances mission progress
function advanceMission(obj) {
  const m = activeMission;
  if (!m) return;

  switch (m.type) {
    case 'collect_n_total':
      m.progress++;
      break;

    case 'collect_n_color': {
      if (obj.color.name === m.meta.color) {
        m.progress++;
      } else {
        m.progress = 0;  // consecutive, reset on wrong color
      }
      break;
    }

    case 'combo_reach':
   // progress mirrors current combo, checked passively in update()
      m.progress = combo;
      break;

    case 'collect_after_rule_change':
      if (missionCollectsSinceCondChange >= 0) {
        missionCollectsSinceCondChange++;
        m.progress = missionCollectsSinceCondChange;
      }
      break;

    case 'survive_seconds':
   // progress tracked via framesLeft countdown in update(); nothing here
      break;
  }

  if (m.type !== 'survive_seconds' && m.type !== 'combo_reach' && m.progress >= m.target) {
    completeMission();
  }
}

// Called on every miss - fails time-sensitive missions
function onMissMission() {
  if (!activeMission) return;
  if (activeMission.type === 'survive_seconds') {
    failMission();
  }
}

// FEVER

function activateFever() {
  if (feverActive) return;
  feverActive = true;
  feverFrames = FEVER_DURATION;
  combo = 0;  // reset combo after fever triggers so bar doesn't instantly re-trigger
  vibrate([20, 10, 20, 10, 40]);
  feedbacks.push({
    text: 'FEVER!',
    color: '#EF9F27',
    alpha: 1, framesLeft: 50,
    ox: cw() / 2, oy: ch() / 2,
  });
  renderFeverUI();
  updateComboBar();
}

function endFever() {
  if (!feverActive) return;
  feverActive = false;
  feverFrames = 0;
  feedbacks.push({
    text: 'FEVER END',
    color: '#aaa',
    alpha: 1, framesLeft: 30,
    ox: cw() / 2, oy: ch() / 2,
  });
  renderFeverUI();
  updateComboBar();
}

function renderFeverUI() {
  if (feverActive) {
  // Hide normal combo bar, show fever track
    comboFill.parentElement.style.display  = 'none';
    feverTrack.classList.add('active');
    feverLabel.classList.add('active');
    feverBarEl.classList.add('active');
  // Fever fill width = remaining time ratio
    const pct = (feverFrames / FEVER_DURATION) * 100;
    feverFill.style.width = pct.toFixed(1) + '%';
  // Pulse rule-bar background between accent and gold
    const ruleBar = document.getElementById('rule-bar');
    if (ruleBar) ruleBar.style.transition = 'background .3s';
  } else {
    comboFill.parentElement.style.display = '';
    feverTrack.classList.remove('active');
    feverLabel.classList.remove('active');
    feverBarEl.classList.remove('active');
    const ruleBar = document.getElementById('rule-bar');
    if (ruleBar) ruleBar.style.transition = 'background .35s ease';
  }
}

// SLOW SKILL

function activateSlow() {
  if (state !== 'play') return;
  if (slowActive) return;   // already running
  if (slowCharges <= 0) return;
  slowCharges--;
  slowActive = true;
  slowFrames = SLOW_DURATION;
  vibrate([8, 4, 8]);
  renderSlowUI();
}

function renderSlowUI() {
  if (!slowBtn) return;
  if (slowCountEl) slowCountEl.textContent = String(slowCharges);
 // Active state
  slowBtn.classList.toggle('active', slowActive);
  slowBtn.classList.toggle('empty',  slowCharges <= 0 && !slowActive);
}

function gainSlowCharge() {
  if (slowCharges >= 3) return;
  slowCharges++;
  renderSlowUI();
}

// Miss: object exited bottom uncollected
function handleMiss(obj) {
  const losesLife = !obj.noLifeLossOnMiss;
  if (losesLife) {
    lives = Math.max(0, lives - 1);
    vibrate([20, 10, 20]);
  }

 // Miss animation: downward label at exit x
  misses.push({ x: obj.x, y: ch() - 20, alpha: 1, framesLeft: 28 });

 // Update life icons (renderLives handles animation via 'pop' class)
  renderLives();

 // End fever on miss
  if (feverActive) endFever();

 // Fail any active time-sensitive mission
  onMissMission();

 // screen flash + player shake
  shakeFrames = 8;
  flashFrames = 6;

  updateUI();

  if (losesLife && lives <= 0 && deathFrame < 0) {
    deathFrame = 8;
  }
}

// GAME INIT / RESET
function initGame() {
  const lv = currentLevel();
  const w  = cw();

  player.x = w / 2 - PLAYER_W / 2;
  player.y = ch() - 52;
  player.vx = 0;
  player.eyeBlink = 0;

  particles     = [];
  objects       = [];
  lastSpawnX    = null;
  lastSpawnPattern = null;
  feedbacks     = [];
  misses        = [];
  score         = 0;
  combo         = 0;
  lives         = (lv.lives || 3);
  frameCount    = 0;
  tick          = 0;
  objSpawnFrame = lv.spawnInterval;
  deathFrame    = -1;
  ruleFlashFrames = 0;
  shakeFrames     = 0;
  flashFrames     = 0;
  comboBarDrain   = 0;
  comboBarPulse   = 0;
  ruleFlash.style.opacity   = '0';
  ruleFlash.style.transform = 'translateY(-20px)';
  comboFill.style.transform = 'scaleY(1)';

 // Set collection condition directly from level
  activeCond = { type: lv.condition, ...(lv.conditionConfig || {}) };
  ruleChangeFrame = frameCount + randInt(200, 400);
 // Reset condition-specific state
  seqIdx               = 0;
  feverActive   = false;
  feverFrames   = 0;
  slowActive     = false;
  slowFrames     = 0;
  slowFadeFrames = 0;
  slowCharges    = 2;
  totalCollects  = 0;

  activeMission              = null;
  missionSpawnFrame          = frameCount + 480;  // 8s at ~60fps
  missionCompleteFrame       = -1;
  missionCollectsSinceCondChange = 0;
  missionsThisLevel          = 0;

  uiTarget.textContent = lv.targetScore;
  applyThemeUI(lv.theme);
  renderConditionBar();
  renderFeverUI();
  renderSlowUI();
  renderMissionPill();
  updateUI();
}

function updateUI() {
  score = toWholeScore(score);
  best = toWholeScore(best);
  uiScore.textContent = score;
  uiCombo.textContent = Math.max(0, Math.round(combo));
  updateComboBar();
  if (state === 'play') updateLevelProgress();
  renderLives();
 // Combo counter in condition bar stays in sync
  const ccv = document.getElementById('cond-combo-val');
  if (ccv) ccv.textContent = combo;
}

function renderLives() {
  const el = document.getElementById('ui-lives');
  if (!el) return;
  const total = currentLevel ? (currentLevel().lives || 3) : 3;
 // Only rebuild if count changed (avoids resetting animations)
  if (el.children.length !== total) {
    el.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const div = document.createElement('div');
      div.className = 'life-icon' + (i >= lives ? ' lost' : '');
      el.appendChild(div);
    }
  } else {
    Array.from(el.children).forEach((div, i) => {
      const shouldBeLost = i >= lives;
      const isLost = div.classList.contains('lost');
      if (shouldBeLost && !isLost) {
        div.classList.add('lost', 'pop');
        div.addEventListener('animationend', () => div.classList.remove('pop'), { once: true });
      } else if (!shouldBeLost && isLost) {
        div.classList.remove('lost');
      }
    });
  }
}

function releaseControls() {
  keys.left = false;
  keys.right = false;
  ctrlLeft.classList.remove('pressed');
  ctrlRight.classList.remove('pressed');
}

function renderPauseButton() {
  if (!pauseBtn) return;
  pauseBtn.setAttribute('aria-label', state === 'paused' ? '이어하기' : '일시정지');
  pauseBtn.innerHTML = state === 'paused'
    ? '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.5v13l10-6.5z"></path></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="7" y="5" width="4" height="14" rx="1"></rect><rect x="13" y="5" width="4" height="14" rx="1"></rect></svg>';
}

function pauseGame() {
  if (state !== 'play') return;
  pausedAt = performance.now();
  state = 'paused';
  cancelAnimationFrame(frameId);
  releaseControls();
  draw();
  hideAllOverlays();
  renderPauseButton();
  pauseOverlay.classList.remove('hidden');
}

function resumeGame() {
  if (state !== 'paused') return;
  const pauseDuration = performance.now() - pausedAt;
  pausedAt = 0;
  objects.forEach(obj => {
    if (obj.spawnTime) obj.spawnTime += pauseDuration;
  });
  lastTime = performance.now();
  state = 'play';
  hideAllOverlays();
  renderPauseButton();
  frameId = requestAnimationFrame(loop);
}

// UPDATE
function update(dt) {
  const w = cw();

 // Player movement
  if (keys.left)  player.vx -= VX_ACCEL;
  if (keys.right) player.vx += VX_ACCEL;
  player.vx *= VX_FRICTION;
  player.x  += player.vx;
 // Shake effect on bad hit
  if (shakeFrames > 0) {
    shakeFrames--;
    player.x += Math.sin(shakeFrames * 2.8) * 4;
  }
  player.x = Math.max(0, Math.min(w - PLAYER_W, player.x));
  if (player.x <= 0 || player.x >= w - PLAYER_W) player.vx = 0;
  if (player.eyeBlink > 0) player.eyeBlink -= dt;

 // Canvas flash countdown
  if (flashFrames > 0) flashFrames--;

 // Combo bar drain animation
  if (comboBarDrain > 0) {
    comboBarDrain--;
    const t = 1 - (comboBarDrain / 10);
    comboFill.style.width      = ((1 - t) * 100) + '%';
    comboFill.style.background = '#D85A30';
    comboFill.style.transform  = 'scaleY(1)';
    if (comboBarDrain === 0) {
      comboFill.style.width = '0%';
      comboFill.style.background = '#378ADD';
    }
  }

 // Combo bar pulse animation
  if (comboBarPulse > 0) {
    comboBarPulse--;
    const pt = comboBarPulse / 12;
    const scale = 1 + Math.sin(pt * Math.PI) * 0.03;
    comboFill.style.transform = `scaleY(${scale.toFixed(3)})`;
    if (comboBarPulse === 0) comboFill.style.transform = 'scaleY(1)';
  }

  frameCount++;
  tick += 0.03;

 // Deferred death
  if (deathFrame > 0) {
    deathFrame--;
    if (deathFrame === 0) { deathFrame = -1; endGame(); return; }
  }

 // Condition bar flash pulse (brief opacity blink when rule-change timer fires)
  if (ruleFlashFrames > 0) {
    ruleFlashFrames--;
    const total = 60;
    const t = ruleFlashFrames / total;
    const opacity = Math.sin(t * Math.PI) * 0.55;
    ruleFlash.style.opacity = opacity.toFixed(3);
    if (ruleFlashFrames === 0) {
      ruleFlash.style.opacity = '0';
    }
  }

 // Periodic condition bar flash pulse
  if (frameCount >= ruleChangeFrame) {
    ruleChangeFrame = frameCount + randInt(200, 400);
    ruleFlash.textContent = '';
    ruleFlashFrames = 60;
  // Reset collect_after_rule_change tracker
    missionCollectsSinceCondChange = 0;
    if (activeMission && activeMission.type === 'collect_after_rule_change') {
      activeMission.progress = 0;
    }
  }

 // Fever countdown
  if (feverActive) {
    feverFrames--;
  // Pulse rule-bar between accent and gold
    const ruleBar = document.getElementById('rule-bar');
    if (ruleBar && feverFrames % 30 < 15) {
      ruleBar.style.background = '#5c4200';
    } else if (ruleBar) {
      const theme = THEMES[currentLevel().theme] || THEMES.space;
   // use the current tint with a gold overlay effect
      ruleBar.style.background = '';
    }
  // Update fever countdown bar
    feverFill.style.width = ((feverFrames / FEVER_DURATION) * 100).toFixed(1) + '%';
    if (feverFrames <= 0) endFever();
  }

 // Slow countdown
  if (slowActive) {
    slowFrames--;
    if (slowFrames <= 0) {
      slowActive = false;
      slowFrames = 0;
      slowFadeFrames = SLOW_FADE_DURATION;
      renderSlowUI();
    }
  }
  if (slowFadeFrames > 0) {
    slowFadeFrames--;
  }

 // Mission spawn / tick
  if (!activeMission && frameCount >= missionSpawnFrame) {
    activeMission = pickMissionForLevel(currentLevel().lv);
    if (activeMission && activeMission.type === 'collect_after_rule_change') {
   // reset trackers
      missionCollectsSinceCondChange = 0;
    }
    renderMissionPill();
  }

  if (activeMission) {
  // survive_seconds: count down frames
    if (activeMission.type === 'survive_seconds') {
      activeMission.framesLeft--;
      if (activeMission.framesLeft <= 0) {
        activeMission.progress = activeMission.target;
        completeMission();
      } else {
        renderMissionPill();
      }
    }
  // combo_reach: passively watch combo
    if (activeMission.type === 'combo_reach') {
      activeMission.progress = combo;
      if (combo >= activeMission.target) completeMission();
      else renderMissionPill();
    }
  // time-limit expiry for other types
    if (activeMission && activeMission.timeLimit !== null && activeMission.type !== 'survive_seconds') {
      const elapsed = frameCount - activeMission.startFrame;
      if (elapsed > activeMission.timeLimit) failMission();
    }
  }

 // Check level clear (score-driven)
  if (score >= currentLevel().targetScore) { levelClear(); return; }

 // Spawn objects
  if (frameCount >= objSpawnFrame) {
    const spawnedPattern = spawnObject();
    const clusterDelay = currentLevel().lv === 18 ? CLUSTER_FOLLOWUP_DELAY_LV18 : CLUSTER_FOLLOWUP_DELAY;
    objSpawnFrame = frameCount + objSpawnInterval() + (spawnedPattern === 'cluster' ? clusterDelay : 0);
  }

  const fallSpeed = objFallSpeed();
  const playerCx  = player.x + PLAYER_W / 2;
  const playerCy  = player.y + PLAYER_H / 2;
  const hitRadius  = OBJ_RADIUS + 13;

  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    updateObject(obj, fallSpeed);

    if (obj.y > ch() + 30) {
      handleMiss(obj);
      objects.splice(i, 1);
      continue;
    }

    const dx = obj.x - playerCx;
    const dy = obj.y - playerCy;
    const hitR = hitRadius + (obj.r - OBJ_RADIUS); // scale hit radius for split children
    if (Math.sqrt(dx * dx + dy * dy) < hitR) {
      handleCollision(obj);
      objects.splice(i, 1);
    }
  }

 // Feedback fade
  for (let i = feedbacks.length - 1; i >= 0; i--) {
    const fb = feedbacks[i];
    fb.framesLeft--;
    fb.alpha = fb.framesLeft / 22;
    if (fb.framesLeft <= 0) feedbacks.splice(i, 1);
  }

 // Miss animation fade
  for (let i = misses.length - 1; i >= 0; i--) {
    const m = misses[i];
    m.framesLeft--;
    m.y += 2.5;
    m.alpha = m.framesLeft / 28;
    if (m.framesLeft <= 0) misses.splice(i, 1);
  }

 // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.alpha -= 0.03;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

// DRAW
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// THEMED SHAPE RENDERERS

function drawStar(x, y, r, fill) {
  const inner = r * 0.42;
  const pts   = 5;
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const angle  = (i * Math.PI) / pts - Math.PI / 2;
    const radius = i % 2 === 0 ? r : inner;
    const px = x + Math.cos(angle) * radius;
    const py = y + Math.sin(angle) * radius;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

function drawPlanet(x, y, r, fill) {
 // Body
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
 // Ring
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.ellipse(x, y, r + 5, r * 0.3, 0.4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
 // Highlight
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle   = '#fff';
  ctx.beginPath();
  ctx.arc(x - 4, y - 4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawRing(x, y, r, fill) {
 // Outer dashed circle
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = fill;
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
 // Inner solid ring
  ctx.strokeStyle = fill;
  ctx.lineWidth   = 3.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(x, y, r * 0.7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawDiamond(x, y, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x,          y - r);
  ctx.lineTo(x + r * 0.65, y);
  ctx.lineTo(x,          y + r);
  ctx.lineTo(x - r * 0.65, y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
 // Highlight
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle   = '#fff';
  ctx.beginPath();
  ctx.moveTo(x,           y - r);
  ctx.lineTo(x + r * 0.65, y);
  ctx.lineTo(x,           y - r * 0.1);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawMushroom(x, y, r, fill) {
  const capR  = r * 0.85;
  const stemW = r * 0.6;
  const stemH = r * 0.7;
 // Cap (upper semicircle)
  ctx.beginPath();
  ctx.arc(x, y, capR, Math.PI, 0);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
 // White spots on cap
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  [[x - capR * 0.35, y - capR * 0.5, 3], [x + capR * 0.35, y - capR * 0.4, 2.5]].forEach(([sx, sy, sr]) => {
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
  });
 // Stem
  const stemX = x - stemW / 2;
  const stemY = y;
  ctx.fillStyle = '#D3D1C7';
  roundRect(ctx, stemX, stemY, stemW, stemH, 3);
  ctx.fill();
}

function drawDrop(x, y, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.bezierCurveTo(x + r * 0.8, y - r * 0.3,  x + r, y + r * 0.4,  x, y + r);
  ctx.bezierCurveTo(x - r,       y + r * 0.4,  x - r * 0.8, y - r * 0.3, x, y - r);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
 // Highlight
  ctx.save();
  ctx.globalAlpha   = 0.3;
  ctx.fillStyle     = '#fff';
  ctx.beginPath();
  ctx.ellipse(x - r * 0.25, y - r * 0.2, r * 0.22, r * 0.38, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawFruit(x, y, r, fill) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
 // Stem
  ctx.strokeStyle = '#2d5a0e';
  ctx.lineWidth   = 1.5;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.lineTo(x, y - r - 7);
  ctx.stroke();
 // Highlight
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle   = '#fff';
  ctx.beginPath();
  ctx.arc(x - 3, y - 3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Dispatch table: shape name -> draw function
const SHAPE_RENDERERS = {
  star:     drawStar,
  planet:   drawPlanet,
  ring:     drawRing,
  diamond:  drawDiamond,
  mushroom: drawMushroom,
  drop:     drawDrop,
  fruit:    drawFruit,
 // legacy generic shapes (still used for rule-bar icon and any future fallback)
  circle:   (x, y, r, fill) => { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = fill; ctx.fill(); },
  triangle: (x, y, r, fill) => {
    const h = r * Math.sqrt(3);
    ctx.beginPath(); ctx.moveTo(x, y - r); ctx.lineTo(x + h/2, y + r/2); ctx.lineTo(x - h/2, y + r/2); ctx.closePath();
    ctx.fillStyle = fill; ctx.fill();
  },
  square: (x, y, r, fill) => {
    const side = r * 1.55, rx2 = 3, sx = x - side/2, sy = y - side/2;
    ctx.beginPath();
    ctx.moveTo(sx+rx2,sy); ctx.lineTo(sx+side-rx2,sy);
    ctx.quadraticCurveTo(sx+side,sy,sx+side,sy+rx2);
    ctx.lineTo(sx+side,sy+side-rx2);
    ctx.quadraticCurveTo(sx+side,sy+side,sx+side-rx2,sy+side);
    ctx.lineTo(sx+rx2,sy+side);
    ctx.quadraticCurveTo(sx,sy+side,sx,sy+side-rx2);
    ctx.lineTo(sx,sy+rx2);
    ctx.quadraticCurveTo(sx,sy,sx+rx2,sy);
    ctx.closePath();
    ctx.fillStyle = fill; ctx.fill();
  },
};

// THEME UI APPLICATION

// Cached star positions for space background (generated once per session)
let _spaceStars = null;
function getSpaceStars(W, H) {
  if (!_spaceStars) {
    _spaceStars = Array.from({ length: 40 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.5 + Math.random() * 1.5,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  return _spaceStars;
}

// Apply accent colour to CSS variables (combo bar accent; condition bar handles its own bg)
function applyThemeUI(themeName) {
  const theme  = THEMES[themeName] || THEMES.space;
  const accent = theme.accentColor;
  document.getElementById('rule-flash').style.background = accent;
  const comboTrack = document.getElementById('combo-track');
  comboTrack.style.background = 'rgba(255,255,255,.1)';
}

function resetThemeUI() {
  document.getElementById('rule-flash').style.background = '#0F6E56';
  document.getElementById('combo-track').style.background = '';
 // Reset condition bar tint
  const ruleBar = document.getElementById('rule-bar');
  if (ruleBar) ruleBar.className = '';
}

// BACKGROUND - three animated theme implementations

function drawBgSpace(W, H) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
 // Grid
  ctx.strokeStyle = 'rgba(100,100,200,0.06)';
  ctx.lineWidth   = 0.5;
  for (let x = 0; x < W; x += 32) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
 // Twinkling stars
  const stars = getSpaceStars(W, H);
  stars.forEach(s => {
    const alpha = 0.4 + Math.sin(tick + s.phase) * 0.3;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle   = '#CECBF6';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawBgNeon(W, H) {
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, W, H);
 // Coloured vertical column sets
  const cols = [
    { color: 'rgba(55,138,221,0.07)',  offset: 0  },
    { color: 'rgba(226,75,74,0.07)',   offset: 20 },
    { color: 'rgba(239,159,39,0.07)',  offset: 40 },
  ];
  ctx.lineWidth = 0.5;
  cols.forEach(({ color, offset }) => {
    ctx.strokeStyle = color;
    for (let x = offset; x < W; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
  });
 // Horizontal scan lines
  ctx.strokeStyle = 'rgba(175,169,236,0.05)';
  for (let y = 0; y < H; y += 24) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawBgForest(W, H) {
  ctx.fillStyle = '#1a2710';
  ctx.fillRect(0, 0, W, H);
 // Tree silhouettes along bottom
  const treeCount = 8;
  for (let i = 0; i < treeCount; i++) {
    const tx  = (W / treeCount) * i + W / treeCount / 2;
    const th1 = 40 + (i * 37 % 31);  // 40??0px variation via deterministic pseudo-random
    const th2 = th1 * 0.65;
    const tw  = th1 * 0.55;
    ctx.fillStyle = 'rgba(63,109,17,0.18)';
  // Back layer (slightly wider, taller)
    ctx.beginPath();
    ctx.moveTo(tx - tw * 0.7, H);
    ctx.lineTo(tx,            H - th1 * 1.1);
    ctx.lineTo(tx + tw * 0.7, H);
    ctx.closePath();
    ctx.fill();
  // Front layer
    ctx.beginPath();
    ctx.moveTo(tx - tw * 0.5, H);
    ctx.lineTo(tx,            H - th2);
    ctx.lineTo(tx + tw * 0.5, H);
    ctx.closePath();
    ctx.fill();
  }
 // Dot grid
  ctx.fillStyle = 'rgba(97,196,34,0.04)';
  for (let x = 0; x < W; x += 28) {
    for (let y = 0; y < H; y += 28) {
      ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawBackground() {
  const W     = cw();
  const theme = (state === 'play' || state === 'paused' || state === 'dead' || state === 'clear') ? currentLevel().theme : 'space';
  if (theme === 'neon')   { drawBgNeon(W, ch());   return; }
  if (theme === 'forest') { drawBgForest(W, ch()); return; }
  drawBgSpace(W, ch());
}

function drawPlayer() {
  const px = player.x, py = player.y;
  const theme = (state === 'play' || state === 'paused') ? (THEMES[currentLevel().theme] || THEMES.space) : THEMES.space;

  ctx.fillStyle = theme.playerFill;
  roundRect(ctx, px, py, PLAYER_W, PLAYER_H, PLAYER_RADIUS);
  ctx.fill();

  const eyeY = py + 9;
  const blink = player.eyeBlink > 0;
  [px + 7, px + 17].forEach(ex => {
    ctx.fillStyle = theme.playerEye;
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, 4, blink ? 1.2 : 4, 0, 0, Math.PI * 2);
    ctx.fill();
    if (!blink) {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(ex + (player.vx > 0 ? 1 : player.vx < 0 ? -1 : 0), eyeY + 1, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawObject(obj) {
  const { x, y, r, color, shape, moving, splitCount } = obj;
  const renderer = SHAPE_RENDERERS[shape] || SHAPE_RENDERERS.circle;

 // Soft glow
  ctx.globalAlpha = 0.18;
  renderer(x, y, r + 7, color.fill);
  ctx.globalAlpha = 1;

 // Main shape
  renderer(x, y, r, color.fill);

 // Moving indicator: dashed ring
  if (moving) {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = color.fill;
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.arc(x, y, r + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

 // Split children: high-contrast ring + tiny marker so they stand out from the parent.
  if (splitCount > 0) {
    ctx.save();
    ctx.globalAlpha = 0.95;
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.arc(x, y, r + 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '700 10px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('!', x, y - (r + 10));
    ctx.restore();
  }

 // Fever: gold outer ring
  if (feverActive) {
    ctx.save();
    ctx.globalAlpha  = 0.75 + 0.25 * Math.sin(tick * 8);
    ctx.strokeStyle  = '#EF9F27';
    ctx.lineWidth    = 2;
    ctx.beginPath();
    ctx.arc(x, y, r + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFeedbacks() {
  const TOTAL = 22;
  feedbacks.forEach(fb => {
    const elapsed = TOTAL - fb.framesLeft; // frames since spawn
    let fontSize;
    if (elapsed <= 8) {
      fontSize = 18 + (24 - 18) * (elapsed / 8);
    } else {
      fontSize = 24 + (14 - 24) * ((elapsed - 8) / (TOTAL - 8));
    }
  // Float up 30px over 22 frames
    const drift = (elapsed / TOTAL) * 30;
    const alpha = Math.max(0, fb.framesLeft / TOTAL);

    ctx.save();
    ctx.globalAlpha  = alpha;
    ctx.fillStyle    = fb.color;
    ctx.font         = `bold ${Math.round(fontSize)}px -apple-system, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(fb.text, fb.ox ?? (cw() / 2), (fb.oy ?? (ch() / 2)) - drift);
    ctx.restore();
  });
}

function drawFlash() {
  if (flashFrames <= 0) return;
  const W = cw();
  ctx.save();
  ctx.globalAlpha = 0.18 * (flashFrames / 8);
  ctx.fillStyle   = 'rgb(216,90,48)';
  ctx.fillRect(0, 0, W, ch());
  ctx.restore();
}

function drawMisses() {
  misses.forEach(m => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, m.alpha);
    ctx.fillStyle   = '#D85A30';
    ctx.font        = `bold 18px -apple-system, sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('MISS', m.x, m.y);
    ctx.restore();
  });
}

function draw() {
  ctx.clearRect(0, 0, cw(), ch());
  if (slowActive) ctx.filter = 'saturate(0.4)';
  drawBackground();
  objects.forEach(drawObject);
  drawParticles();
  if (slowActive) ctx.filter = 'none';
  drawPlayer();
  drawFlash();
  drawFeedbacks();
  drawMisses();
}

// GAME LOOP
function loop(ts) {
  if (state !== 'play') return;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  update(dt);
  draw();
  frameId = requestAnimationFrame(loop);
}

// STATE TRANSITIONS

// Show the 1.5-second level intro, then start play
function showLevelIntro(lvIdx, afterCb) {
  state = 'intro';
  cancelAnimationFrame(frameId);
  clearTimeout(introTimer);
  renderPauseButton();

  currentLevelIdx = lvIdx;
  const lv = currentLevel();

 // Populate intro overlay
  introLv.textContent     = `Level ${lv.lv}`;
  introTitle.textContent  = lv.title;
  introTheme.textContent  = `테마: ${lv.theme}`;
  introTarget.textContent = `목표 점수: ${lv.targetScore}`;

  const COND_LABEL = {
    free_collect:   '자유 수집',
    color_sequence: '순서 수집',
  };
  introMechs.innerHTML = `<span class="mech-chip">${COND_LABEL[lv.condition] || lv.condition}</span>`;

  hideAllOverlays();
  introOverlay.classList.remove('hidden');

  const ticks = ['3', '2', '1', 'GO!'];
  let t = 0;
  function tick() {
    if (t >= ticks.length) {
      introOverlay.classList.add('hidden');
      afterCb();
      return;
    }
    introCountdown.textContent = ticks[t++];
    introTimer = setTimeout(tick, 375);
  }
  tick();
}

function startGame() {
  initGame();
  pausedAt = 0;
  state = 'play';
  hideAllOverlays();
  renderPauseButton();
  lastTime = performance.now();
  frameId = requestAnimationFrame(loop);
}

function endGame() {
  state = 'dead';
  renderPauseButton();
  score = toWholeScore(score);
  best = toWholeScore(best);
  if (score > best) best = score;
  cancelAnimationFrame(frameId);
  draw();

 // Persist best score for this level
  const lv  = currentLevel();
  const idx = lv.lv - 1;
  if (score > (save.bestScores[idx] || 0)) {
    save.bestScores[idx] = score;
    save.totalScore = toWholeScore((save.totalScore || 0) + score);
    writeSave();
  }

  const pct        = Math.min(score / lv.targetScore, 1);
  const livesLost  = (lv.lives || 3) - lives;
  retryScore.textContent = `Lv ${lv.lv} ${lv.title} · 점수 ${score} / ${lv.targetScore}`;
  retryProg.style.width  = (pct * 100) + '%';
  retryPct.textContent   = `${Math.round(pct * 100)}% 달성 · 잃은 목숨 ${livesLost}개`;

  hideAllOverlays();
  retryOverlay.classList.remove('hidden');
  updateUI();
}

function levelClear() {
  state = 'clear';
  renderPauseButton();
  cancelAnimationFrame(frameId);
  draw();
  vibrate([30, 20, 30, 20, 50]);
  score = toWholeScore(score);
  best = toWholeScore(best);

  const lv    = currentLevel();
  const idx   = lv.lv - 1;

 // Save progress
  if (lv.lv >= save.unlockedUpTo && lv.lv < 20) {
    save.unlockedUpTo = lv.lv + 1;
  }
  if (score > (save.bestScores[idx] || 0)) {
    save.bestScores[idx] = score;
  }
  save.totalScore = (save.totalScore || 0) + score;
  save.totalScore = toWholeScore(save.totalScore);
  writeSave();

  clearLv.textContent    = `Lv ${lv.lv} · ${lv.title}`;
  clearScore.textContent = `점수 ${score}`;

  clearNextBtn.style.display = lv.lv >= 20 ? 'none' : '';

  hideAllOverlays();
  clearOverlay.classList.remove('hidden');
  updateUI();
}

function hideAllOverlays() {
  overlay.classList.add('hidden');
  introOverlay.classList.add('hidden');
  clearOverlay.classList.add('hidden');
  retryOverlay.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  renderMissionPill(); // hides pill when state !== 'play'
}

// LEVEL SELECT SCREEN
function showLevelSelect() {
  state = 'levelselect';
  cancelAnimationFrame(frameId);
  clearTimeout(introTimer);
  renderPauseButton();

  levelSelectEl.classList.add('active');
  gameUiEl.style.display = 'none';

  renderLevelGrid(activePhaseTab);
}

function hideLevelSelect() {
  levelSelectEl.classList.remove('active');
  gameUiEl.style.display = 'flex';
}

let activePhaseTab = 0;

function renderLevelGrid(phase) {
  if (phase !== undefined) activePhaseTab = phase;
  levelGridCont.innerHTML = '';

 // Update phase tab active state
  document.querySelectorAll('.phase-tab').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.phase) === activePhaseTab);
  });

  const lvs  = LEVELS.filter(l => l.phase === activePhaseTab);
  const grid = document.createElement('div');
  grid.className = 'level-grid-5';

  lvs.forEach(lv => {
    const unlocked  = lv.lv <= save.unlockedUpTo;
    const bestScore = save.bestScores[lv.lv - 1] || 0;
    const completed = bestScore > 0;

    const card = document.createElement('div');
    card.className = 'lv-card ' + (unlocked ? (completed ? 'completed' : 'available') : 'locked');

    const dotClass = `dot-${lv.theme}`;

    card.innerHTML = `
      <div class="lv-num" style="font-size:13px;font-weight:500">${lv.lv}</div>
      <div class="lv-dot ${dotClass}" style="width:6px;height:6px"></div>
      ${unlocked
        ? (completed
            ? `<div class="lv-stars-row" style="font-size:10px;color:#0F6E56;font-weight:700">CLEAR</div>`
            : `<div class="lv-stars-row" style="font-size:10px;color:#bbb">PLAY</div>`)
        : `<div class="lv-lock" style="font-size:12px;color:#ccc">🔒</div>`}
    `;

    if (unlocked) {
      card.addEventListener('click', () => {
        hideLevelSelect();
        showLevelIntro(lv.lv - 1, startGame);
      });
    }

    grid.appendChild(card);
  });

  levelGridCont.appendChild(grid);
}

// Phase tab wiring
document.querySelectorAll('.phase-tab').forEach(btn => {
  btn.addEventListener('click', () => renderLevelGrid(parseInt(btn.dataset.phase)));
});

// OVERLAY / BUTTON WIRING

// Start screen button -> level 1 intro
overlayBtn.addEventListener('click', () => {
  showLevelIntro(0, startGame);
});
overlaySelectBtn.addEventListener('click', showLevelSelect);

// Level clear -> next level
clearNextBtn.addEventListener('click', () => {
  const next = Math.min(currentLevelIdx + 1, LEVELS.length - 1);
  showLevelIntro(next, startGame);
});

clearSelectBtn.addEventListener('click', showLevelSelect);

// Retry -> same level
retryBtn.addEventListener('click', () => {
  showLevelIntro(currentLevelIdx, startGame);
});

retrySelBtn.addEventListener('click', showLevelSelect);
pauseBtn.addEventListener('click', () => {
  if (state === 'play') pauseGame();
  else if (state === 'paused') resumeGame();
});
pauseResumeBtn.addEventListener('click', resumeGame);

// Level select back button
lsBackBtn.addEventListener('click', () => {
  hideLevelSelect();
 // Return to start screen if game hasn't started yet, otherwise retry overlay
  if (state === 'levelselect') {
    hideAllOverlays();
    resetThemeUI();
    overlay.classList.remove('hidden');
    drawBackground();
    state = 'idle';
  }
});

// SLOW SKILL BUTTON
slowBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  activateSlow();
});

// Double-tap canvas to activate slow
let lastTapTime = 0;
canvas.addEventListener('touchend', e => {
  const now = performance.now();
  if (now - lastTapTime < 300) activateSlow();
  lastTapTime = now;
}, { passive: true });

// Keyboard: 's' key activates slow
document.addEventListener('keydown', e => {
  if (e.key === 's' || e.key === 'S') activateSlow();
});

// TOUCH SWIPE ON CANVAS
// BUTTON CONTROLS
function pressBtn(btn, key, down) {
  keys[key] = down;
  btn.classList.toggle('pressed', down);
}
ctrlLeft.addEventListener('pointerdown',   () => pressBtn(ctrlLeft,  'left',  true));
ctrlLeft.addEventListener('pointerup',     () => pressBtn(ctrlLeft,  'left',  false));
ctrlLeft.addEventListener('pointerleave',  () => pressBtn(ctrlLeft,  'left',  false));
ctrlLeft.addEventListener('touchcancel',   () => pressBtn(ctrlLeft,  'left',  false));
ctrlRight.addEventListener('pointerdown',  () => pressBtn(ctrlRight, 'right', true));
ctrlRight.addEventListener('pointerup',    () => pressBtn(ctrlRight, 'right', false));
ctrlRight.addEventListener('pointerleave', () => pressBtn(ctrlRight, 'right', false));
ctrlRight.addEventListener('touchcancel',  () => pressBtn(ctrlRight, 'right', false));

// KEYBOARD
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && (state === 'play' || state === 'paused')) {
    e.preventDefault();
    if (state === 'play') pauseGame();
    else resumeGame();
  }
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'play' && state !== 'paused') overlayBtn.click();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left  = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// SETTINGS PANEL
function openSettings() {
  if (state === 'play') pauseGame();
 // Sync toggle states from save
  sfxToggle.checked = save.settings.sfxEnabled;
  vibToggle.checked = save.settings.vibrationEnabled;
  settingsSheet.classList.add('open');
}
function closeSettings() {
  settingsSheet.classList.remove('open');
}

settingsBtn.addEventListener('click', openSettings);
settingsClose.addEventListener('click', closeSettings);
settingsBackdrop.addEventListener('click', closeSettings);

sfxToggle.addEventListener('change', () => {
  save.settings.sfxEnabled = sfxToggle.checked;
  writeSave();
});

vibToggle.addEventListener('change', () => {
  save.settings.vibrationEnabled = vibToggle.checked;
  writeSave();
});

dataResetBtn.addEventListener('click', () => {
  if (confirm('모든 진행 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.')) {
    try { localStorage.removeItem(SAVE_KEY); } catch (_) {}
    save = defaultSave();
    closeSettings();
  // Return to start screen
    state = 'idle';
    cancelAnimationFrame(frameId);
    clearTimeout(introTimer);
    hideLevelSelect();
    hideAllOverlays();
    resetThemeUI();
    overlay.classList.remove('hidden');
    drawBackground();
    renderPauseButton();
    updateUI();
  }
});

// BOOT
// Sync toggle UI with loaded save before first render
sfxToggle.checked = save.settings.sfxEnabled;
vibToggle.checked = save.settings.vibrationEnabled;
resetThemeUI();
activeCond = { type: LEVELS[0].condition, ...(LEVELS[0].conditionConfig || {}) };
renderConditionBar();
drawBackground();
overlay.classList.remove('hidden');
renderPauseButton();
updateUI();
</script>
